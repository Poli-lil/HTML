<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        img{
            width: 150px;
            box-shadow: 2px 2px 15px black;
        }

        .container{
            background-color: lightcoral;
            border: rgb(117, 191, 194) 1px solid;
            border-radius: 15px;
            margin: 2em;
            padding: 1.5em;
            height: 300px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-direction: row;
            gap: 1.5em;
            flex-wrap: wrap;
            
        }
        .flex-elem{
            flex-basis: 100px;
            /* width: 150px; */
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }

        .elem1{
            /* flex-grow: 1; */
            background-color: cornflowerblue;
            /* order: 3; */
        }

        .elem2{
            /* flex-grow: 2; */
            background-color: hotpink;
            /* order: 1; */
        }
        .elem3{
            /* flex-grow: 2; */
            flex-shrink: 2;
            background-color: rgb(151, 69, 199);
            /* order: 4; */
        }
        .elem4{
            /* flex-grow: 1; */
            background-color: rgb(36, 85, 114);
            /* order: 2; */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="flex-elem elem1">1</div>
        <div class="flex-elem elem2">2</div>
        <div class="flex-elem elem3">3</div>
        <div class="flex-elem elem4">4</div>
        <!-- <img src="..//shared_resourse/emoij.png" alt="emoji"> 
        <img src="..//shared_resourse/emoij.png" alt="emoji"> 
        <img src="..//shared_resourse/emoij.png" alt="emoji">  -->
    </div>
</body>
</html>
