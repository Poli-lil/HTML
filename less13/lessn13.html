<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Формы</title>

    <style>
        form{
            border: 2px solid black;
            padding: 1.3em;
        }
    </style>
</head>
<body>

    <form action="/search" method="get">
        <h2></h2>
        <label for="username">Имя пользователя</label>
        <input type="text"  name="username" id="username">
        <br>
        <label for="email">Електронная почта</label>
        <input type="text" name="email" id="email">
        <br>
        <label for="passwd">passwd</label>
        <input type="text" name="passwd" id="passwd">
        <br>
        <label for="about">про себе:</label>
        <br>
        <textarea name="about" id="about"></textarea>
        <br>
        <label for="agree">Принимаю лицензию</label>
        <input type="checkbox" name="agree" id="agree">
        <br>
        <input type="submit"  value="Зарегестрировались">

        <fieldset>
            <legend>пол</legend>
            <input type="radio" name="Gender" id="Genderm" value="male">
            <label for="genderM">Чоловік</label>

            <input type="radio" name="gender" id="genderF" value="female">
            <label for="genderF">Жінка</label>

            <input type="radio" name="gender" id="genderO" value="other">
            <label for="genderO">Інше</label>
        </fieldset>

    <label for="fav-pizza">Улюблена піца:</label>
    <select name="fav-pizza" id="fav-pizza">
        <option value="pepperoni">Пепероні</option>
        <option value="margarita">Маргарита</option>
        <option value="quatro-formaggio">Чотири сири</option>
        </select>

        <br>
    <label for="fav-genre">Улюблений жанр:</label>
    <input type="text" name="fav-genre" id="fav-genre" list="genres">
    <datalist id="genres">
        <option value="horror">Фільм жахів</option>
        <option value="action">Екшн</option>
        <option value="drama">Драма</option>
    </datalist>
    <br>
    <label for="birth-day">Дата народження:</label>
    <input type="date" name="birth-day" id="birth-day">
    <br>

    <label for="link">Соц. мережі:</label>
    <input type="url" name="link" id="link">
    <br>

    <label for="tall">Ваш зріст:</label>
    <input type="number" name="tall" id="tall">

    </form>
    <form action="/search" method="get">
        <h2>Пошук</h2>
        <input type="text"  name="query">
        <input type="submit"  value="Поиск">
        <input type="reset"  value="очистить">
    </form>
    
</body>
</html>
