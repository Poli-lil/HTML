<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #195e1f;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .card {
            width: 100%;
            max-width: 900px;
            height: 300px;
            border-radius: 12px;
            color: rgb(227, 245, 235);
            display: flex;
            align-items: center;
            padding: 40px;
        }

        
        .content h1 {
            font-size: 32px;
            margin: 15px 0;
        }
         
        .path {
            opacity: 0.7;
            font-size: 14px;
        }

        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        
        .author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: rgb(245, 245, 178);
            border-radius: 50%;
        }

        .meta {
            display: flex;
            gap: 15px;
            font-size: 14px;
        }
        @media (max-width: 600px) {

            .card {
                height: auto;
                padding: 20px;
            }

            .content h1 {
                font-size: 22px;
            }

            .info {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .meta {
                flex-direction: column;
                gap: 5px;
           }
        }

    </style>
</head>
<body>
    <div class="container">
    <div class="card">
        <div class="content">
            <p class="path">Home / Articles</p>
            <h1>The Difference Between Responsive and Adaptive Design</h1>

            <div class="info">

                <div class="author">
                    <div class="avatar"></div>
                    <span>Geoff Graham</span>
                </div>
                <div class="meta">
                    <span>49 Comments</span>
                    <span>Nov 11, 2018</span>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
