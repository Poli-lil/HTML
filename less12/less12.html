<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid layout</title>

    <style>
        .grid-container{
            width: 80vw;
            margin: 1.3em auto;
            padding: 1.3em;
            background-color: rgb(180, 243, 243);
            display: grid;
            /* grid-template-columns: auto auto auto; сколько столбиков и ширина */
            /* grid-template-columns: 100px 30vw 35% 4em; */
            /* grid-template-columns: 1fr 2fr 1fr 3fr; */
            /* grid-template-columns: 100px 3em 1fr 30% 2fr; */
            grid-template-columns: repeat(4,1fr);
            /* grid-template-rows: 100px 3vh; */
            /* column-gap: 1.1em; */
            /* row-gap: 0.3em; */
            /* gap: row column; */
            gap: 0.2em 1.1em;
        }

        .grid-container div:nth-child(1){
            /* grid-column-start: 1;
            grid-column-end: 3; */
            /* grid-column: 1 / span 3;
            grid-row: 1 / span 2; */
            /* grid-area: row-start / colum-stert / row-end / column-end; */
            grid-area: 1 / 1 / 3 / 4;
        }
        .grid-container div:nth-child(2){
            grid-area: 1 / 4 / 5 / 5;
        }

        .grid-container div{
            width: 100%;
            height: auto;
            background-color: rgb(245, 239, 247);
            border: rgb(142, 105, 211) solid 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;

        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
    </div>
</body>
</html>
