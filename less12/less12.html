<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid layout</title>

    <style>
        .grid-container{
            width: 80vw;
            margin: 1.3em auto;
            padding: 1.3em;
            background-color: rgb(180, 243, 243);
            display: grid;
            /* grid-template-columns: auto auto auto; сколько столбиков и ширина */
            /* grid-template-columns: 100px 30vw 35% 4em; */
            /* grid-template-columns: 1fr 2fr 1fr 3fr; */
            /* grid-template-columns: 100px 3em 1fr 30% 2fr; */
            grid-template-columns: repeat(4,1fr);
            /* grid-template-rows: 100px 3vh; */
            /* column-gap: 1.1em; */
            /* row-gap: 0.3em; */
            /* gap: row column; */
            gap: 0.2em 1.1em;
        }

        .grid-container div:nth-child(1){
            /* grid-column-start: 1;
            grid-column-end: 3; */
            /* grid-column: 1 / span 3;
            grid-row: 1 / span 2; */
            /* grid-area: row-start / colum-stert / row-end / column-end; */
            grid-area: 1 / 1 / 3 / 4;
        }
        .grid-container div:nth-child(2){
            grid-area: 1 / 4 / 5 / 5;
        }
        .container{
            margin: 1.1em auto;
            padding: 0.6em;
            min-height: 100vh;
            max-width: 100vw;
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            grid-template-rows: 10vh 1fr 5vh;
            grid-template-areas:
            ' header header header'
            'menu main right'
            'footer footer footer';
        }

         .container div{
            background-color: rgb(127, 167, 241);
            border: rgb(85, 85, 214) solid 2px;
         }
        
        .menu{
            grid-area: menu;
        }
        .main{
            grid-area: main;
        }
        .right{
            grid-area: right;
        }
        .footer{
            grid-area: footer;
        }

        .header{
            display: flex;
            align-items: center;
            grid-area: header;
            padding: 0.2em;
            padding-left: 0.7em;
        }

        .header div{
            border: none;
            text-transform: uppercase;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            transition: all 0.35s ease;
        }

        .grid-container div{
            width: 100%;
            height: auto;
            background-color: rgb(245, 239, 247);
            border: rgb(142, 105, 211) solid 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;

        }

        .header div:hover{
            text-shadow: 2px 2px 5px black;
        }
        .header div:nth-child(3){
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
        <div>Home</div>
        <div>Search</div>
        <div>lod out</div>
        </div>
        <div class="menu">menu</div>
        <div class="main">main</div>
        <div class="right">right</div>
        <div class="footer">footer</div>
    </div>

        <div>1</div>

</body>
</html>
