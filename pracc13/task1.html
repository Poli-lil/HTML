<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task1</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #ff4b2b;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: white;
    padding: 40px 30px;
    width: 300px;
    text-align: center;
    border-radius: 5px;
}

.avatar {
    top: -40px;
    left: 50%;
}

.avatar img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 4px solid white;
}

.login-box h2 {
    margin-top: 40px;
    margin-bottom: 20px;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-bottom: 1px solid #e6e4e4;
}

.login-btn {
    width: 100%;
    padding: 10px;
    background: #2db64d;
    color: white;
    border: none;
    margin-top: 10px;
}

.forgot {
    display: block;
    margin-top: 10px;
    font-size: 12px;
    color: #ff593c;
}

.soc {
    margin-top: 20px;
}

.soc p {
    font-size: 14px;
}

.soc button {
    width: 45%;
    padding: 10px;
    border: none;
    color: white;
    margin: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.soc img {
    width: 16px;
    height: 16px;
}

.facebook {
    background: #3b5998;
}

.twitter {
    background: #1da1f2;
}
</style>
</head>

<body>

<div class="login-box">
    <div class="avatar">
        <img src="..//pracc13/account.png" alt="avatar">
    </div>

    <h2>Member Login</h2>

    <form>
        <label for="use">Login</label>
        <input type="text" name="use">

        <label for="pass">passwd</label>
        <input type="text" name="pass">
    </form>

    <div class="soc">
        <p>or login with:</p>

        <button class="facebook">Facebook </button>

        <button class="twitter">Twitter</button>
    </div>

</div>

</body>
</html>
