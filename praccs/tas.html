<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body
    class="bg-slate-100 flex items-center justify-center min-h-screen">
     <div class="flex flex-col md:flex-row bg-white rounded-3xl shadow-lg max-w-2xl w-full overflow-hidden">
        <div class="bg-indigo-600 text-white p-10 flex flex-col items-center text-center rounded-3xl w-1/2">
            <h2 class="text-indigo-200 text-xl font-bold mb-8">Your Result</h2>
            <div class="w-36 h-36 rounded-full flex flex-col items-center justify-center bg-indigo-700 mb-6">
                <span class="text-6xl font-bold">76</span>
                <span class="text-indigo-300 text-sm">of 100</span>
            </div>
            <p class="text-2xl font-bold mb-3">Great</p>
            <p class="text-indigo-200 text-sm px-4">
                You scored higher than 65% of the people who have taken these tests.
            </p>
        </div>
        <div class="p-8 flex flex-col md:w-1/2">
            <h3 class="text-slate-800 text-xl font-bold mb-6">Summary</h3>
            <div class="space-y-4 mb-8">
                <div class="flex justify-between items-center p-4 rounded-xl bg-red-50">
                    <div class="flex items-center gap-3">
                        <img src="..//praccs/icon-reaction.svg" alt="" class="w-5 h-5"> 
                        <span class="text-red-500 font-bold">Reaction</span>
                    </div>
                    <div class="text-slate-400 font-bold"><span class="text-slate-800">80</span> / 100</div>
                </div>
                <div class="flex justify-between items-center p-4 rounded-xl bg-yellow-50">
                    <div class="flex items-center gap-3">
                        <img src="..//praccs/icon-memory.svg" alt="" class="w-5 h-5"> 
                        <span class="text-yellow-600 font-bold">Memory</span>
                    </div>
                    <div class="text-slate-400 font-bold"><span class="text-slate-800">92</span> / 100</div>
                </div>
                <div class="flex justify-between items-center p-4 rounded-xl bg-green-50">
                    <div class="flex items-center gap-3">
                        <img src="../praccs/icon-verbal.svg" alt="" class="w-5 h-5">
                        <span class="text-green-600 font-bold">Verbal</span>
                    </div>
                    <div class="text-slate-400 font-bold"><span class="text-slate-800">61</span> / 100</div>
                </div>
                <div class="flex justify-between items-center p-4 rounded-xl bg-blue-50">
                    <div class="flex items-center gap-3">
                        <img src="..//praccs/icon-visual.svg" alt="" class="w-5 h-5">
                        <span class="text-blue-700 font-bold">Visual</span>
                    </div>
                    <div class="text-slate-400 font-bold"><span class="text-slate-800">73</span> / 100</div>
                </div>
                <button class="w-full bg-slate-800 text-white py-4 rounded-full font-bold hover:bg-slate-700 transition-colors">
                    Continue
                </button>
        </div>
     </div>
    
</body>
</html>
