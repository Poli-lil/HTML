<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabb</title>

    <style>
        table{
            width: 80%;
            min-width: 650px;
            max-width: 800px;
            margin: 0 auto;
            border-collapse: collapse;
            font-family: Arial, Helvetica, sans-serif;
        }

        caption{
            text-align: right;
            text-transform: uppercase;
            color: rgb(95, 92, 92);
            font-weight: 700;
        }

        th{
            text-transform: uppercase;
            color: rgb(255, 255, 255);
        }

        th,td{
            text-align: center;
            padding: 1em 0;
        }
        tr td:first-child{
            text-align: left;
            color: rgb(104, 99, 99);
            padding-left: 0.7em;
        }

        .col-1{
            background-color: rgb(206, 199, 199);
            width: auto;
        }

        .col-2{
            background-color: rgb(92, 189, 221);
            width: 17%;
        }

        .col-3{
            background-color: rgb(121, 211, 121);
            width: 17%;
        }

        .col-4{
            background-color: rgb(233, 216, 119);
            width: 17%;
        }

        .col-5{
            background-color: rgb(235, 115, 139);
            width: 17%;
        }


        span{
            color:white;
            font-weight: 700;
            font-size: 1.2em;
            display: inline-block;
            border: 2px solid white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            line-height: 25px;
        }

        thead{
            border-bottom: 1px solid rgb(187, 189, 189);
        }

        tfoot{
            border-top: 1px solid rgb(177, 183, 184);
        }
    </style>
</head>
<body>
    <table>
        <caption>TITLE TABLE</caption>
        <colgroup>
            <col class="col-1">
            <col class="col-2">
            <col class="col-3">
            <col class="col-4">
            <col class="col-5">
        </colgroup>
        <thead>
            <tr>
                <th>specification</th>
                <th>Free</th>
                <th>basic</th>
                <th>standart</th>
                <th>premium</th>
            </tr>
        </thead>
        <tfoot>
            <th>Total</th>
            <th>$ 0.99</th>
            <th>$ 9.99</th>
            <th>$ 19.99</th>
            <th>$ 29.99</th>
        </tfoot>
         <tbody>
            <tr>
                <td>Lorem, ipsum dolor.</td>
                <td><span>+</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
            </tr>
            <tr>
                <td>Lorem, ipsum dolor.</td>
                <td><span>+</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
            </tr>
            <tr>
                <td>Lorem, ipsum dolor.</td>
                <td><span>-</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
            </tr>
            <tr>
                <td>Lorem, ipsum dolor.</td>
                <td><span>-</span></td>
                <td><span>-</span></td>
                <td><span>+</span></td>
                <td><span>+</span></td>
            </tr>
            <tr>
                <td>Lorem, ipsum dolor.</td>
                <td><span>-</span></td>
                <td><span>-</span></td>
                <td><span>-</span></td>
                <td><span>+</span></td>
            </tr>
            <tr>
                <td>Lorem, ipsum dolor.</td>
                <td><span>-</span></td>
                <td><span>-</span></td>
                <td><span>-</span></td>
                <td><span>+</span></td>
            </tr>
        </tbody>

    </table>
</body>
</html>
